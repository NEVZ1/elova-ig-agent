services:
  - type: web
    name: elova-dm-api
    runtime: python
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    preDeployCommand: alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health/ready
    envVars:
      - key: ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: LLM_PROVIDER
        value: openai
      - key: LLM_UNIFIED_MODE
        value: "true"
      # Gemini optional (only if LLM_PROVIDER=gemini)
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash-lite
      - key: ADMIN_API_KEY
        sync: false
      - key: IG_VERIFY_TOKEN
        sync: false
      - key: IG_APP_SECRET
        sync: false
      - key: IG_PAGE_ID
        sync: false
      - key: IG_PAGE_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_NUMBER
        sync: false
      - key: BOOKING_URL
        sync: false

  - type: worker
    name: elova-dm-worker
    runtime: python
    plan: starter
    branch: main
    buildCommand: pip install -r requirements.txt
    # Explicitly pass broker/backend to avoid Render env var blank-values breaking Celery
    # (e.g. CELERY_BROKER_URL="") which causes "No such transport: ".
    startCommand: celery -A app.workers.celery_app.celery worker -B -l info --concurrency=1 -b "$REDIS_URL" --result-backend "$REDIS_URL"
    envVars:
      - key: ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: LLM_PROVIDER
        value: openai
      - key: LLM_UNIFIED_MODE
        value: "true"
      # Gemini optional (only if LLM_PROVIDER=gemini)
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash-lite
      - key: IG_PAGE_ID
        sync: false
      - key: IG_PAGE_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_NUMBER
        sync: false
      - key: BOOKING_URL
        sync: false
