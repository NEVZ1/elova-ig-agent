services:
  - type: web
    name: elova-dm-api
    env: python
    plan: starter
    repo: https://gitlab.com/NEVZ1/elova-ig-agent.git
    branch: main
    buildCommand: pip install -r requirements.txt
    preDeployCommand: alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health/ready
    envVars:
      - key: ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: DATABASE_URL
        fromDatabase:
          name: elova-dm-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: elova-dm-redis
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: LLM_PROVIDER
        value: gemini
      - key: LLM_UNIFIED_MODE
        value: "true"
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash-lite
      - key: ADMIN_API_KEY
        sync: false
      - key: IG_VERIFY_TOKEN
        sync: false
      - key: IG_APP_SECRET
        sync: false
      - key: IG_PAGE_ID
        sync: false
      - key: IG_PAGE_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_NUMBER
        sync: false
      - key: BOOKING_URL
        sync: false

  - type: worker
    name: elova-dm-worker
    env: python
    plan: starter
    repo: https://gitlab.com/NEVZ1/elova-ig-agent.git
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A app.workers.celery_app.celery worker -l info
    envVars:
      - key: ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: DATABASE_URL
        fromDatabase:
          name: elova-dm-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: elova-dm-redis
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: LLM_PROVIDER
        value: gemini
      - key: LLM_UNIFIED_MODE
        value: "true"
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash-lite
      - key: IG_PAGE_ID
        sync: false
      - key: IG_PAGE_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_NUMBER
        sync: false
      - key: BOOKING_URL
        sync: false

  - type: worker
    name: elova-dm-beat
    env: python
    plan: starter
    repo: https://gitlab.com/NEVZ1/elova-ig-agent.git
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A app.workers.celery_app.celery beat -l info
    envVars:
      - key: ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: DATABASE_URL
        fromDatabase:
          name: elova-dm-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: elova-dm-redis
          property: connectionString
      - key: LLM_PROVIDER
        value: gemini
      - key: LLM_UNIFIED_MODE
        value: "true"
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash-lite
      - key: IG_PAGE_ID
        sync: false
      - key: IG_PAGE_ACCESS_TOKEN
        sync: false

  - type: redis
    name: elova-dm-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  - name: elova-dm-postgres
    plan: starter
    ipAllowList: []
